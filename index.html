<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Viewport estricto para móvil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frankenstein Game</title>
    <style>
        body { margin: 0; background: #000; color: #8CFF98; font-family: monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Contenedor que se adapta al 100% del ancho del móvil */
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 50vh; 
            background: #1a1a1a; 
            border: 2px solid #6F7C12;
            overflow: hidden;
        }

        /* Pantallas (Inicio, Game Over, Final) */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 100;
        }

        /* Botón grande para que sea fácil presionar en móvil */
        .btn { 
            background: #AAD922; color: #000; padding: 20px 40px; 
            font-size: 1.5rem; border: none; border-radius: 10px; cursor: pointer;
            pointer-events: auto; /* Asegura que reciba el click */
        }

        .hidden { display: none !important; }
        
        /* Ajustes de texto para que se vea bien */
        #dialogue-overlay { position: absolute; bottom: 0; width: 100%; background: #000; padding: 10px; z-index: 50; }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 5px 0; background: #333; color: #fff; border: 1px solid #8CFF98; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Pantalla de Inicio -->
        <div id="start-screen" class="screen">
            <h2 style="color: #AAD922;">FRANKENSTEIN</h2>
            <button class="btn" id="start-btn">START</button>
        </div>

        <!-- Diálogos -->
        <div id="dialogue-overlay" class="hidden">
            <div id="dialogue-box" style="font-size: 1rem;">...</div>
            <div id="options-box"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const dialogueOverlay = document.getElementById('dialogue-overlay');

        // Función de inicio simplificada
        function startGame() {
            startScreen.classList.add('hidden');
            console.log("Juego iniciado");
            // Aquí llamarías a tu lógica de juego original
        }

        // Eventos para móvil (touchstart es más rápido que click)
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, {passive: false});

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
